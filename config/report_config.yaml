# Report catalogue.
# System paths and database/category mappings live in config/system_config.yaml.

categories:
  AG:
    display_name: "AG Reports"
  LMS:
    display_name: "LMS Reports"
  Language:
    display_name: "Language Survey Reports"
  Utility:
    display_name: "Utility Reports"

reports:
  user:
    display_name: "User Report"
    description: "User management and assignment metadata"
    category: "AG"
    module: "reports.user_report"
    class: "UserReport"
    available_filters: ["role", "country"]
    sheets: ["User Details", "Role Summary"]

  user-activity:
    display_name: "User Activity Report"
    description: "Application usage, last use date, project roles, and activity summary"
    category: "AG"
    module: "reports.user_activity_report"
    class: "UserActivityReport"
    available_filters: ["role", "country", "has_activity"]
    sheets: ["All Users", "Active Users", "Inactive Users", "Role Distribution", "Summary Statistics"]

  user-assignments:
    display_name: "User Assignment Report"
    description: "User assignments across AG projects"
    category: "AG"
    module: "reports.user_assignment_report"
    class: "UserAssignmentReport"
    available_filters: ["user_id", "username", "role", "country", "project_type"]

  worklog:
    display_name: "Worklog Report"
    description: "Translation work tracking and productivity"
    category: "AG"
    module: "reports.worklog_report"
    class: "WorklogReport"
    available_filters: ["role", "stage", "software", "project_type", "country", "language"]

  individual:
    display_name: "Individual Performance Report"
    description: "Per-person performance across projects"
    category: "AG"
    module: "reports.individual_performance_report"
    class: "IndividualPerformanceReport"
    available_filters: ["user_id", "username", "role", "country", "language"]

  consolidated:
    display_name: "Consolidated Project Report"
    description: "Combined AG project completion overview"
    category: "AG"
    module: "reports.consolidated_report_dynamic"
    class: "ConsolidatedReportDynamic"
    available_filters: ["project_type", "country", "language"]

  bible-completion:
    display_name: "Bible Completion Report"
    description: "Bible translation progress by verses and chapters"
    category: "AG"
    module: "reports.bible_project_completion_report"
    class: "BibleProjectCompletionReport"
    available_filters: ["project_id", "user_id", "role", "country", "language"]

  obs-completion:
    display_name: "OBS Completion Report"
    description: "Open Bible Stories translation and audio progress"
    category: "AG"
    module: "reports.obs_project_completion_report"
    class: "OBSProjectCompletionReport"
    available_filters: ["project_id", "user_id", "role", "country"]

  literature-completion:
    display_name: "Literature Completion Report"
    description: "Literature project completion"
    category: "AG"
    module: "reports.literature_project_completion_report"
    class: "LiteratureProjectCompletionReport"
    available_filters: ["project_id", "user_id", "country"]

  literature-genre:
    display_name: "Literature Genre Report"
    description: "Literature genre details"
    category: "AG"
    module: "reports.literature_genre_report"
    class: "LiteratureGenreReport"
    available_filters: ["project_id", "user_id", "country"]

  grammar-completion:
    display_name: "Grammar Completion Report"
    description: "Grammar phrases, pronouns, and connectives progress"
    category: "AG"
    module: "reports.grammar_project_completion_report"
    class: "GrammarProjectCompletionReport"
    available_filters: ["project_id", "user_id", "role", "country"]

  ag-drafting:
    display_name: "AG Drafting Monitoring Report"
    description: "AG drafting monitoring workbook"
    category: "AG"
    module: "reports.ag_drafting_monitoring_report"
    class: "AGDraftingMonitoringReport"
    available_filters: ["country", "language", "dialect", "project_type"]

  lms:
    display_name: "LMS Summary Report"
    description: "LMS course enrollment, attendance, and surveys"
    category: "LMS"
    module: "reports.lms_report"
    class: "LMSReport"
    available_filters: ["course_id", "batch_id", "country", "role"]

  lms-comprehensive:
    display_name: "LMS Comprehensive Report"
    description: "Comprehensive LMS workbook"
    category: "LMS"
    module: "reports.lms_comprehensive_report"
    class: "LMSComprehensiveReport"
    available_filters: ["batch_id", "course_id", "country"]

  lms-batch:
    display_name: "LMS Batch Detail Report"
    description: "Detailed batch workbook"
    category: "LMS"
    module: "reports.batch_detailed_report"
    class: "BatchDetailedReport"
    available_filters: ["batch_id", "batch_name"]

  batch-detail:
    display_name: "Single Batch Detail Report"
    description: "Single LMS batch detail workbook"
    category: "LMS"
    module: "reports.batch_detail_report"
    class: "BatchDetailReport"
    available_filters: ["batch_id", "batch_name"]

  telios-geojson:
    display_name: "Telios GeoJSON Summary Report"
    description: "Telios GeoJSON summary workbook"
    category: "LMS"
    module: "reports.telios_geojson_report"
    class: "TeliosGeoJSONReport"
    available_filters: ["region", "country", "project_type", "date_range"]

  telios-geojson-data:
    display_name: "Telios GeoJSON Data Export"
    description: "Telios GeoJSON data export"
    category: "LMS"
    module: "reports.telios_geojson_report"
    class: "TeliosGeoJSONDataReport"
    available_filters: ["feature_id", "region", "country"]

  language-survey:
    display_name: "Language Survey Report"
    description: "Language survey analysis"
    category: "Language"
    module: "reports.language_survey_report"
    class: "LanguageSurveyReport"
    available_filters: ["batch_id", "language", "country"]

  language-dashboard:
    display_name: "Language Dashboard"
    description: "Consolidated language dashboard"
    category: "Language"
    module: "reports.language_dashboard"
    class: "LanguageDashboard"
    available_filters: ["language", "country", "survey_type"]

  custom:
    display_name: "Custom SQL Report"
    description: "Execute a custom SQL query"
    category: "Utility"
    module: "reports.custom_report"
    class: "CustomReport"
    available_filters: []
