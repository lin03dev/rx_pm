# System configuration.
# Report definitions live in config/report_config.yaml.

output:
  reports_path: "./output/reports"
  templates_path: "./output/templates"
  uploads_path: "./output/uploads"
  logs_path: "./output/logs"
  timestamp_format: "%Y%m%d_%H%M%S"
  categories:
    AG:
      reports_path: "./output/reports/AG"
      templates_path: "./output/templates/AG"
    LMS:
      reports_path: "./output/reports/LMS"
      templates_path: "./output/templates/LMS"
    Telios:
      reports_path: "./output/reports/Telios"
      templates_path: "./output/templates/Telios"
    Language:
      reports_path: "./output/reports/Language"
      templates_path: "./output/templates/Language"

databases:
  default: "AG_Dev"
  items:
    AG_Dev:
      project: "AG"
      category: "AG"
      output_category: "AG"
      template_category: "AG"
    Telios_LMS_Dev:
      project: "LMS"
      category: "LMS"
      output_category: "LMS"
      template_category: "LMS"
    Telios_Survey_Dev:
      project: "Telios"
      category: "Telios"
      output_category: "Telios"
      template_category: "Telios"

reports:
  default_format: "excel"
  max_rows: 50000

templates:
  auto_generate_on_startup: false
  include_example_data: true

uploads:
  max_file_size_mb: 50
  allowed_extensions: [".xlsx", ".xls"]
  require_approval: true
