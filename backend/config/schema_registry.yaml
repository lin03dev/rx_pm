    description: Per-person performance across projects
    sources:
      primary: AG
      tables: [users, users_to_projects, projects, worklogs]
    filters: [user_id, username, role, country, language]
    output:
      sheets:
        individual_summary: { display_name: "1. Individual Summary", role: primary, auto_width: true }
        summary_stats:
          display_name: "2. Summary Statistics"
          role: summary
          layout: key_value
          metric_column: Metric
          value_column: Value

  bible-completion:
    version: "1.0"
    display_name: "Bible Completion Report"
    category: AG
    module: reports.bible_project_completion_report
    class: BibleProjectCompletionReport
    description: Bible translation progress by verses and chapters
    sources:
      primary: AG
      tables: [bt_projects, bt_projects_books, bt_projects_chapters, users_to_projects, projects]
    filters: [project_id, user_id, role, country, language]
    output:
      sheets:
        projects_overview: { display_name: "1. All Bible Projects", role: primary, auto_width: true }
        mtt_assignments: { display_name: "2. MTT Assignments", role: detail, auto_width: true }
        project_status: { display_name: "3. Assigned vs Completed", role: detail, auto_width: true }
        summary_stats:
          display_name: "4. Summary Statistics"
          role: summary
          layout: key_value
          metric_column: Metric
          value_column: Value

  obs-completion:
    version: "1.0"
    display_name: "OBS Completion Report"
    category: AG
    module: reports.obs_project_completion_report
    class: OBSProjectCompletionReport
    description: Open Bible Stories translation and audio progress
    sources:
      primary: AG
      tables: [obs_projects, obs_project_chapters, users_to_projects, projects]
    filters: [project_id, user_id, role, country]
    output:
      sheets:
        projects_overview: { display_name: "1. All OBS Projects", role: primary, auto_width: true }
        mtt_assignments: { display_name: "2. MTT Assignments", role: detail, auto_width: true }
