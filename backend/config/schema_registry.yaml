        summary_stats:
          display_name: "2. Summary Statistics"
          role: summary
          layout: key_value
          metric_column: Metric
          value_column: Value
          value_percent_highlight: true

  user-assignments:
    version: "1.0"
    display_name: "User Assignment Report"
